<!DOCTYPE html>
<html>

<head>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="height:2000px;"> <!-- extra height just to demo scrolling -->

    <a id="mobile-sign-up-btn"
        href="/instant-quote"
        target="_self">
        Get Instant Quote
    </a>

    <style>
        #mobile-sign-up-btn {
            display: flex;
            justify-content: center;
            border-radius: 4px;
            background-color: rgba(245, 207, 0, 1);
            color: #000;
            text-align: center;
            font-size: 18px;
            padding: 15px 0;
            text-decoration: none;
            cursor: pointer;
            font-family: "Roboto";
            width: 100%;
            font-weight: bold;

            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 9999;

            /* Animation setup */
            transform: translateY(100%);
            transition: transform 0.4s ease-in-out;
        }

        /* normal visible state */
        #mobile-sign-up-btn.show {
            transform: translateY(0);
        }

        @media screen and (min-width: 767px) {
            #mobile-sign-up-btn {
                display: none !important;
            }
        }
    </style>

    <script>
        const button = document.getElementById("mobile-sign-up-btn");
        const triggerPoint = 150; // pixels scrolled before showing

        window.addEventListener("scroll", () => {
            if (window.scrollY > triggerPoint) {
                button.classList.add("show");
            } else {
                button.classList.remove("show");
            }
        });
    </script>

</body>
</html>
