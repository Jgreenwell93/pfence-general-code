<!DOCTYPE html>
<html>

<head>
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
</head>

<body>

    <a id="pfixer-pay-btn" 
   href="https://pflugervillepfnc.securepayments.cardpointe.com/pay" 
   target="_blank">
   <span>Pfixer Payment Portal</span>
</a>

<style>
    /* Button-like styling for the <a> */
    #pfixer-pay-btn {
        display: inline-block;
        border-radius: 4px;
        background-color: rgba(245, 207, 0, 1);
        border: none;
        color: #000000;
        text-align: center;
        font-size: 18px;
        padding: 15px 25px;
        text-decoration: none;
        transition: all 0.5s;
        cursor: pointer;
        font-family: "roboto";

        /* Fixed positioning */
        position: fixed;
        top: 33%;           /* 1/3 down the page */
        left: -85px;       /* pulls it to the edge */
        transform: rotate(90deg);
        transform-origin: center center;
        z-index: 9999;      /* always on top */
    }

    /* inner span to handle the arrow animation */
    #pfixer-pay-btn span {
        cursor: pointer;
        display: inline-block;
        position: relative;
        transition: 0.5s;
    }

    #pfixer-pay-btn span:after {
        content: '\00ab'; /* « */
        position: absolute;
        opacity: 0;
        bottom: 0;
        left: -20px;
        transition: 0.5s;
    }

    #pfixer-pay-btn:hover span {
        padding-left: 25px;
    }

    #pfixer-pay-btn:hover span:after {
        opacity: 1;
        left: 0;
    }
</style>


</body>


</html>
